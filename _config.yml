title: "LourahJs Documentation"
description: "Documentation du projet LourahJs"
url: "https://lourah.com"
baseurl: ""

# --- Just the Docs (version compatible GitHub Pages) ---
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme

# --- Options Just the Docs ---
color_scheme: dark
search_enabled: true
heading_anchors: true

# --- Navigation ---
nav_sort: case_sensitive
nav_order: 1

nav:
  - title: "My Software Activity"
    url: /my-software-activity/

  - title: "My GitHub"
    url: /my-software-activity/my-github/

  - title: "LourahJs Ecosystem"
    url: /my-software-activity/my-github/lourahjs-ecosystem/
    children:
      - title: "Engine"
        url: /my-software-activity/my-github/lourahjs-ecosystem/engine/
      - title: "JavaScript Modules"
        url: /my-software-activity/my-github/lourahjs-ecosystem/js/
      - title: "API"
        url: /my-software-activity/my-github/lourahjs-ecosystem/api/
      - title: "Tutorials"
        url: /my-software-activity/my-github/lourahjs-ecosystem/tutorials/
      - title: "Reference"
        url: /my-software-activity/my-github/lourahjs-ecosystem/reference/

# --- Logo & favicon ---
logo: "/assets/images/logo.png"
favicon_ico: "/assets/images/favicon.ico"

# --- Markdown options ---
markdown: kramdown
kramdown:
  input: GFM

# --- Exclusions ---
exclude:
  - "README.md"
  - "Gemfile"
  - "Gemfile.lock"
  - "node_modules"
  - "vendor"

